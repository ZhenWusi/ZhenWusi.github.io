<script>
  // 音乐播放器控制
  const musicToggleBtn = document.getElementById('music-toggle-btn');
  const musicPanel = document.getElementById('music-panel');
  const playBtn = document.getElementById('play-btn');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  const songTitle = document.getElementById('song-title');
  const songArtist = document.getElementById('song-artist');
  const currentTime = document.getElementById('current-time');
  const totalTime = document.getElementById('total-time');
  const progressFill = document.getElementById('progress-fill');
  const playlistList = document.getElementById('playlist-list');
  const songCount = document.getElementById('song-count');
  const lyricsSection = document.getElementById('lyrics-section');
  const lyricsToggle = document.getElementById('lyrics-toggle');
  const currentLyric = document.getElementById('current-lyric');
  const floatingLyrics = document.getElementById('floating-lyrics');
  const floatingLyricsHeader = document.getElementById('floating-lyrics-header');
  const lyricsClose = document.getElementById('lyrics-close');
  const floatingCurrentLyric = document.getElementById('floating-current-lyric');
  
  let songs = [];
  let currentSongIndex = 0;
  let isPlaying = false;
  let audioElement = null;
  let lyricsData = [];
  let currentLyricIndex = 0;
  let lyricsVisible = false;
  let isDragging = false;
  let dragOffsetX = 0;
  let dragOffsetY = 0;
  
  // 创建音频元素
  function createAudioElement() {
    audioElement = new Audio();
    audioElement.addEventListener('timeupdate', updateProgress);
    audioElement.addEventListener('ended', playNext);
    audioElement.addEventListener('error', handleAudioError);
  }
  
  // 处理音频错误
  function handleAudioError() {
    console.error('音频播放失败:', audioElement.error);
    // 尝试下一首
    if (currentSongIndex < songs.length - 1) {
      playNext();
    }
  }
  
  // 更新进度
  function updateProgress() {
    if (audioElement && audioElement.duration) {
      const progress = (audioElement.currentTime / audioElement.duration) * 100;
      progressFill.style.width = progress + '%';
      
      currentTime.textContent = formatTime(Math.floor(audioElement.currentTime));
      totalTime.textContent = formatTime(Math.floor(audioElement.duration));
      
      // 更新歌词
      updateLyrics(audioElement.currentTime);
    }
  }
  
  // 歌词拖动功能
  function initLyricsDrag() {
    if (!floatingLyrics) return;
    
    floatingLyricsHeader.addEventListener('mousedown', startDrag);
    document.addEventListener('mousemove', drag);
    document.addEventListener('mouseup', endDrag);
    
    // 触摸事件支持
    floatingLyricsHeader.addEventListener('touchstart', startDrag);
    document.addEventListener('touchmove', drag);
    document.addEventListener('touchend', endDrag);
  }
  
  function startDrag(e) {
    isDragging = true;
    const rect = floatingLyrics.getBoundingClientRect();
    dragOffsetX = e.clientX - rect.left;
    dragOffsetY = e.clientY - rect.top;
    
    floatingLyrics.style.cursor = 'grabbing';
    e.preventDefault();
  }
  
  function drag(e) {
    if (!isDragging) return;
    
    const x = e.clientX - dragOffsetX;
    const y = e.clientY - dragOffsetY;
    
    // 限制在屏幕范围内
    const maxX = window.innerWidth - floatingLyrics.offsetWidth;
    const maxY = window.innerHeight - floatingLyrics.offsetHeight;
    
    const finalX = Math.max(0, Math.min(x, maxX));
    const finalY = Math.max(0, Math.min(y, maxY));
    
    floatingLyrics.style.left = finalX + 'px';
    floatingLyrics.style.top = finalY + 'px';
    floatingLyrics.style.transform = 'none';
    
    e.preventDefault();
  }
  
  function endDrag() {
    isDragging = false;
    if (floatingLyrics) {
      floatingLyrics.style.cursor = 'grab';
    }
  }
  
  // 获取网易云歌单数据
  async function fetchPlaylist() {
    try {
      console.log('正在获取歌单数据...');
      // 从配置文件中获取歌单 ID
      const playlistId = '2993057618';
      console.log('使用歌单 ID:', playlistId);
      
      const response = await fetch(`https://api.injahow.cn/meting/?type=playlist&id=${playlistId}`);
      const data = await response.json();
      
      console.log('歌单数据:', data);
      
      if (data && data.length > 0) {
        songs = data.map(song => ({
          title: song.name || song.title,
          artist: song.artist || song.ar?.[0]?.name || '未知艺术家',
          url: song.url,
          lrc: song.lrc,
          pic: song.pic
        }));
        
        console.log('处理后的歌曲列表:', songs);
        updatePlaylist();
        updateSongInfo();
        songCount.textContent = `${songs.length}首`;
      }
    } catch (error) {
      console.error('获取歌单失败:', error);
      // 使用备用数据
      songs = [
        { title: "加载失败", artist: "请检查网络", url: "", lrc: "", pic: "" }
      ];
      updatePlaylist();
      updateSongInfo();
    }
  }
  
  // 获取歌词
  async function fetchLyrics(song) {
    try {
      console.log('正在获取歌词:', song.title);
      console.log('歌曲数据:', song);
      
      // 重置歌词数据
      lyricsData = [];
      currentLyricIndex = 0;
      
      // 如果歌曲本身有歌词，直接使用
      if (song.lrc) {
        console.log('使用歌曲自带歌词');
        lyricsData = parseLyrics(song.lrc);
      } else {
        console.log('尝试通过API获取歌词');
        
        // 尝试多种方法获取歌词
        let lyricsFound = false;
        
        // 方法1：使用歌单ID + 歌曲名获取歌词
        try {
          const playlistId = '2993057618';
          console.log('尝试方法1 - 歌单ID获取:', playlistId);
          
          // 先获取歌单中所有歌曲的详细信息
          const playlistResponse = await fetch(`https://api.injahow.cn/meting/?type=playlist&id=${playlistId}`);
          const playlistData = await playlistResponse.json();
          
          if (playlistData && playlistData.length > 0) {
            // 查找匹配的歌曲
            const matchedSong = playlistData.find(s => 
              s.name === song.title || 
              s.title === song.title
            );
            
            if (matchedSong && matchedSong.lrc) {
              console.log('找到匹配歌曲的歌词');
              lyricsData = parseLyrics(matchedSong.lrc);
              lyricsFound = true;
            }
          }
        } catch (error) {
          console.log('方法1失败:', error);
        }
        
        // 方法2：如果方法1失败，尝试使用歌曲ID
        if (!lyricsFound && song.url) {
          try {
            console.log('尝试方法2 - 歌曲URL获取');
            // 从URL中提取可能的ID
            const urlParts = song.url.split('/');
            const possibleId = urlParts[urlParts.length - 1];
            
            if (possibleId) {
              const response = await fetch(`https://api.injahow.cn/meting/?type=lrc&id=${possibleId}`);
              const data = await response.json();
              
              if (data && data.lrc) {
                console.log('通过歌曲ID获取到歌词');
                lyricsData = parseLyrics(data.lrc);
                lyricsFound = true;
              }
            }
          } catch (error) {
            console.log('方法2失败:', error);
          }
        }
        
        // 方法3：如果都失败，显示示例歌词
        if (!lyricsFound) {
          console.log('所有方法都失败，使用示例歌词');
          lyricsData = [
            { time: 0, text: "♪ 暂无歌词 ♪" },
            { time: 3, text: "♪ 请检查网络连接 ♪" },
            { time: 6, text: "♪ 或尝试其他歌曲 ♪" }
          ];
        }
      }
      
      console.log('最终歌词数据:', lyricsData);
      
      // 显示歌词
      if (lyricsData.length > 0) {
        if (currentLyric) {
          currentLyric.textContent = lyricsData[0].text;
        }
        if (floatingCurrentLyric) {
          floatingCurrentLyric.textContent = lyricsData[0].text;
        }
      } else {
        if (currentLyric) {
          currentLyric.textContent = '♪ 暂无歌词 ♪';
        }
        if (floatingCurrentLyric) {
          floatingCurrentLyric.textContent = '♪ 暂无歌词 ♪';
        }
      }
    } catch (error) {
      console.error('获取歌词失败:', error);
      if (currentLyric) {
        currentLyric.textContent = '♪ 歌词加载失败 ♪';
      }
      if (floatingCurrentLyric) {
        floatingCurrentLyric.textContent = '♪ 歌词加载失败 ♪';
      }
    }
  }
  
  // 解析歌词
  function parseLyrics(lrcText) {
    if (!lrcText) return [];
    
    const lines = lrcText.split('\n');
    const lyrics = [];
    
    lines.forEach(line => {
      const match = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/);
      if (match) {
        const minutes = parseInt(match[1]);
        const seconds = parseInt(match[2]);
        const milliseconds = parseInt(match[3]);
        const time = minutes * 60 + seconds + milliseconds / 1000;
        const text = match[4].trim();
        
        if (text) {
          lyrics.push({ time, text });
        }
      }
    });
    
    return lyrics.sort((a, b) => a.time - b.time);
  }
  
  // 更新歌词
  function updateLyrics(currentTime) {
    if (lyricsData.length === 0 || !lyricsVisible) return;
    
    // 找到当前时间对应的歌词
    let currentIndex = 0;
    for (let i = 0; i < lyricsData.length; i++) {
      if (lyricsData[i].time <= currentTime) {
        currentIndex = i;
      } else {
        break;
      }
    }
    
    // 如果歌词有变化，更新显示
    if (currentIndex !== currentLyricIndex) {
      currentLyricIndex = currentIndex;
      const lyric = lyricsData[currentIndex];
      
      if (lyric) {
        if (currentLyric) {
          currentLyric.textContent = lyric.text;
          // 添加淡入效果
          currentLyric.style.opacity = '0';
          setTimeout(() => {
            currentLyric.style.opacity = '1';
          }, 100);
        }
        
        if (floatingCurrentLyric) {
          floatingCurrentLyric.textContent = lyric.text;
          // 添加淡入效果
          floatingCurrentLyric.style.opacity = '0';
          setTimeout(() => {
            floatingCurrentLyric.style.opacity = '1';
          }, 100);
        }
      }
    }
  }
  
  // 播放当前歌曲
  function playCurrentSong() {
    if (songs.length > 0 && songs[currentSongIndex]) {
      const song = songs[currentSongIndex];
      
      if (!audioElement) {
        createAudioElement();
      }
      
      // 加载歌词
      fetchLyrics(song);
      
      if (song.url) {
        audioElement.src = song.url;
        audioElement.play().then(() => {
          isPlaying = true;
          updatePlayButton();
        }).catch(error => {
          console.error('播放失败:', error);
          // 如果播放失败，尝试下一首
          if (currentSongIndex < songs.length - 1) {
            playNext();
          }
        });
      } else {
        console.error('歌曲URL为空:', song);
        // 如果URL为空，尝试下一首
        if (currentSongIndex < songs.length - 1) {
          playNext();
        }
      }
    }
  }
  
  // 播放下一首
  function playNext() {
    if (songs.length > 0) {
      currentSongIndex = (currentSongIndex + 1) % songs.length;
      updateSongInfo();
      updatePlaylist();
      if (isPlaying) {
        playCurrentSong();
      }
    }
  }
  
  // 播放上一首
  function playPrev() {
    if (songs.length > 0) {
      currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
      updateSongInfo();
      updatePlaylist();
      if (isPlaying) {
        playCurrentSong();
      }
    }
  }
  
  // 暂停播放
  function pauseCurrentSong() {
    if (audioElement) {
      audioElement.pause();
    }
    isPlaying = false;
    updatePlayButton();
  }
  
  // 更新播放按钮
  function updatePlayButton() {
    const icon = playBtn.querySelector('i');
    if (isPlaying) {
      icon.className = 'fas fa-pause';
      musicToggleBtn.classList.add('playing');
      // 显示浮动歌词
      if (floatingLyrics) {
        floatingLyrics.classList.add('active');
        if (!isDragging) {
          floatingLyrics.style.left = '50%';
          floatingLyrics.style.top = '50%';
          floatingLyrics.style.transform = 'translate(-50%, -50%)';
        }
      }
    } else {
      icon.className = 'fas fa-play';
      musicToggleBtn.classList.remove('playing');
      // 隐藏浮动歌词
      if (floatingLyrics) {
        floatingLyrics.classList.remove('active');
      }
    }
  }
  
  // 更新歌曲信息
  function updateSongInfo() {
    if (songs.length > 0 && songs[currentSongIndex]) {
      const song = songs[currentSongIndex];
      songTitle.textContent = song.title;
      songArtist.textContent = song.artist;
    }
  }
  
  // 更新播放列表
  function updatePlaylist() {
    playlistList.innerHTML = songs.map((song, index) => `
      <div class="playlist-item ${index === currentSongIndex ? 'active' : ''}" data-index="${index}">
        <div class="song-info">
          <div class="song-name">${song.title}</div>
          <div class="song-artist">${song.artist}</div>
        </div>
      </div>
    `).join('');
    
    // 添加点击事件
    document.querySelectorAll('.playlist-item').forEach(item => {
      item.addEventListener('click', function() {
        currentSongIndex = parseInt(this.dataset.index);
        updateSongInfo();
        updatePlaylist();
        if (isPlaying) {
          playCurrentSong();
        }
      });
    });
  }
  
  // 歌词显示切换
  if (lyricsToggle) {
    lyricsToggle.addEventListener('click', function() {
      console.log('歌词切换按钮被点击');
      lyricsVisible = !lyricsVisible;
      console.log('歌词显示状态:', lyricsVisible);
      
      if (lyricsVisible) {
        lyricsSection.classList.add('show');
        lyricsToggle.innerHTML = '<i class="fas fa-eye-slash"></i>';
        console.log('显示歌词区域');
        
        // 如果有当前歌曲，加载歌词
        if (songs.length > 0 && songs[currentSongIndex]) {
          fetchLyrics(songs[currentSongIndex]);
        }
        
        // 显示浮动歌词
        if (floatingLyrics) {
          floatingLyrics.classList.add('active');
          if (!isDragging) {
            floatingLyrics.style.left = '50%';
            floatingLyrics.style.top = '50%';
            floatingLyrics.style.transform = 'translate(-50%, -50%)';
          }
        }
      } else {
        lyricsSection.classList.remove('show');
        lyricsToggle.innerHTML = '<i class="fas fa-eye"></i>';
        console.log('隐藏歌词区域');
        
        // 隐藏浮动歌词
        if (floatingLyrics) {
          floatingLyrics.classList.remove('active');
        }
      }
    });
  }
  
  // 关闭浮动歌词
  if (lyricsClose) {
    lyricsClose.addEventListener('click', function() {
      if (floatingLyrics) {
        floatingLyrics.classList.remove('active');
        lyricsVisible = false;
        lyricsSection.classList.remove('show');
        if (lyricsToggle) {
          lyricsToggle.innerHTML = '<i class="fas fa-eye"></i>';
        }
      }
    });
  }
  
  // 切换音乐面板
  if (musicToggleBtn && musicPanel) {
    musicToggleBtn.addEventListener('click', function() {
      musicPanel.classList.toggle('active');
      if (songs.length === 0) {
        fetchPlaylist();
      }
    });
  }
  
  // 点击面板外部关闭
  document.addEventListener('click', function(e) {
    if (musicPanel && !musicPanel.contains(e.target) && !musicToggleBtn.contains(e.target)) {
      musicPanel.classList.remove('active');
    }
  });
  
  // 播放控制
  if (playBtn) {
    playBtn.addEventListener('click', function() {
      if (isPlaying) {
        pauseCurrentSong();
      } else {
        playCurrentSong();
      }
    });
  }
  
  if (prevBtn) {
    prevBtn.addEventListener('click', function() {
      playPrev();
    });
  }
  
  if (nextBtn) {
    nextBtn.addEventListener('click', function() {
      playNext();
    });
  }
  
  // 初始化拖动功能
  initLyricsDrag();
  
  function formatTime(seconds) {
    const minutes = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${minutes}:${secs.toString().padStart(2, '0')}`;
  }
</script>
